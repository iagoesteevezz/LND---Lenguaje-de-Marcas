<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var nums = [5, 4, 3, 10, 9, 1, 2, 6, 7, 8];
         document.write("La lista inicial es: " + nums.join(", ") + "<br>");
        nums.sort(function(a, b) { return a - b; });
        document.write("La lista ordenada es: " + nums.join(", "));

    </script>
</body>
</html>
