<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var number = 5;
        function esPar(num) {
            if (num & 2 == 0)
                return true;
            else
                return false;
        }
        document.write("El número " + number + " es par? " + esPar(number));
    </script>    
</body>
</html>
