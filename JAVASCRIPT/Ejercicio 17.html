<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ej 17</title>
</head>
<body>
    <script>
        function escribirtantasVeces(numeroDeVeces) {
        for (var i = 0; i <= numeroDeVeces; i++) {
            if (i == numeroDeVeces) {
                document.write(i);
            } else if (numeroDeVeces == 0){
                document.write(i);
            } else {
                document.write(i+" + ");
        }
        
    }document.write(" = " + numeroDeVeces);
}
    var num = 0;
    escribirtantasVeces(num);
    </script>
    
</body>
</html>
