    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Ej15</title>
    </head>
    <body>
        <script>
            function AreaTriangulo(base, altura) {
                return (base * altura) / 2;
            }
            //ahora se lo pedimos al usuario
            var base = prompt("Introduce la base del triángulo:");
            var altura = prompt("Introduce la altura del triángulo:");
            document.write("<br>El área del triángulo con base " + base + " y altura " + altura + " es: " + AreaTriangulo(base, altura));
        </script>
        
        
    </body>
    </html>
