<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        num = prompt("Introduce un número");
        document.write("<h1>Tabla de Multiplicar del " + num + "</h1>");
       for (var i = 0; i <= 10; i++) {
            document.write(num + " x " + i + " = " + num * i + "<br>");
        }   

    </script>
</body>
</html>
