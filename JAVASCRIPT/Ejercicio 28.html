<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ej28</title>
</head>
<body>
    <script>
        edad = prompt("Introduce tu edad: ");
        if (edad >= 18)
            document.write("Ya te puedes sacar el carnet de conducir");
        else
            document.write("Te quedan " + (18 - edad) + " años para poder sacarte el carnet de conducir");
    </script>
</body>
</html>
