<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ej25</title>
</head>
<body>
    <script>
        radio = prompt("Introduce el radio del cÍrculo en centímetros:");
        var longitud = 2 * Math.PI * radio;
        var area = Math.PI * radio ** 2;
        document.write("La longitud de la circunferencia es: " + longitud.toFixed(2) + " cm<br>");
        document.write("El área del círculo es: " + area.toFixed(2) + " cm2");
    </script>
</body>
</html>
