<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var fecha = new Date();
        document.write("Hoy es " + fecha.getDate() + " de " + (fecha.getMonth()+1) + " de " + fecha.getFullYear() + "<br>");
        document.write("Son las " + fecha.getHours() + ":" + fecha.getMinutes() + ":" + fecha.getSeconds() + " h");
    </script>
</body>
</html>
