<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ej31</title>
</head>
<body>
    <script>
        var res = prompt("¿Qué topping quieres con el helado? (oreo, kitkat, brownie, lacasitos, sin topping)");
        if (res == "sin topping") {
            document.write("El helado sin topping cuesta 1.90 €.");
        } else if (res == "oreo") {
            document.write("El topping de oreo cuesta 1 €.");
        } else if (res == "kitkat") {
            document.write("El topping de KitKat cuesta 1.50 €.");
        } else if (res == "brownie") {
            document.write("El topping de brownie cuesta 0.75 €.");
        } else if (res == "lacasitos") {
            document.write("El topping de lacasitos cuesta 0.95 €.");
        } else {
            document.write("Topping no válido.");
        }
    </script>
</body>
</html>
