<body>
    <script>
        var respuesta = prompt("¿Es usted culpable?");
        if (respuesta == "si") {
            document.write("va a ir a la cárcel.");
        } else if (respuesta == "no") {
            document.write("Puede usted ir a casa.");
        } else {
            document.write("Respuesta equivocada, dame su documentación.");
        }
    </script>
</body>
