<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">

</head>
<body>
    <script>
        //1 - Para el array de nombre 'capitales' escribe una instruccion que devuelva por la consola del navegador la longitud del vector.
        var capitales = ["Madrid", "Las Palmas de Gran Canaria","Barcelona","Valverde", "Paris"];
        console.log(capitales.length);
        //2 - Escribe en el documento web las posiciones primera, tercera, última
        document.write(capitales[0], capitales[2], capitales[capitales.length - 1]);
        //3 - Añade en última posición la ciudad de Badalona.
        capitales.push("Badalona");
        //4 - Escribe por pantalla el elemento que ocupa la segunda posición;
        document.write(capitales[1]);
        //5 - Sustituye el elemento que ocupa la segunda posicion por la ciudad de 'Santa Coloma'.
        capitales[1] = "Santa Coloma";
        //6 - Escribe una rutina que intercambie los valores de las posiciones 3 y 4.
        var temp = capitales[2];
        capitales[2] = capitales[3];
        capitales[3] = temp;

</script>

</body>

    </script>
