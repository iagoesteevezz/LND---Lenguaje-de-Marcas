<html>
<head>
    <title> Tablas d eoperadores lógicos</title>
</head>
<body>

<script>
    var x = true, y = false;
    document.write(x + "&&" + y + " = " + (x && y) + "<br>");
    document.write(y + "&&" + x + " = " + (y && x) + "<br>");
    document.write(x + "&&" + x + " = " + (x && x) + "<br>");
    document.write(y + "&&" + y + " = " + (y && y) + "<br>");

    document.write(x + "||" + y + " = " + (x || y) + "<br>");
    document.write(y + "||" + x + " = " + (y || x) + "<br>");
    document.write(x + "||" + x + " = " + (x || x) + "<br>");
    document.write(y + "||" + y + " = " + (y || y) + "<br>");
</script>
</body>
</html>
